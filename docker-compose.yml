services:
  ros2:
    image: osrf/ros:jazzy-desktop
    platform: linux/amd64
    container_name: ros2-jazzy
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - ROS_DOMAIN_ID=0
    volumes:
      - ./src:/workspace/src
    working_dir: /workspace
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash -c "source /opt/ros/jazzy/setup.bash && exec bash"
